<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web Viewer - Nexus Remote</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:#000;color:#fff;overflow:hidden}
#toolbar{position:fixed;top:0;left:0;right:0;background:rgba(0,0,0,0.8);padding:8px 16px;display:flex;gap:10px;align-items:center;z-index:100}
#toolbar input{padding:8px;border-radius:6px;border:1px solid #333;background:#1a1a1a;color:#fff;flex:1;max-width:300px}
#toolbar button{padding:8px 16px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:600;color:#fff}
.btn-connect{background:#22c55e}.btn-stop{background:#ef4444}.btn-full{background:#6366f1}
#screen{width:100%;height:calc(100vh - 50px);margin-top:50px;display:flex;align-items:center;justify-content:center}
#screen img{max-width:100%;max-height:100%;object-fit:contain}
#screen .no-signal{text-align:center;color:#666}
#screen .no-signal .icon{font-size:80px;margin-bottom:16px}
#status{position:fixed;bottom:16px;right:16px;background:rgba(0,0,0,0.8);padding:8px 12px;border-radius:8px;font-size:11px;color:#888}
#status span{color:#22c55e}
#nav-links{position:fixed;bottom:16px;left:16px;display:flex;gap:8px}
#nav-links a{color:#888;text-decoration:none;font-size:11px;background:rgba(0,0,0,0.8);padding:6px 10px;border-radius:6px}
</style>
</head>
<body>
<div id="toolbar">
<span style="font-weight:bold;color:#6366f1">Nexus Web Viewer</span>
<input type="text" id="peerInput" placeholder="Enter Peer ID...">
<button class="btn-connect" onclick="connect()">Connect</button>
<button class="btn-stop" onclick="disconnect()">Disconnect</button>
<button class="btn-full" onclick="document.documentElement.requestFullscreen()">Fullscreen</button>
</div>

<div id="screen">
<div class="no-signal" id="noSignal">
<div class="icon">🖥</div>
<h2>No Device Connected</h2>
<p style="color:#666;margin-top:8px">Enter a Peer ID and click Connect</p>
<p style="color:#444;margin-top:8px;font-size:12px">Demo: Use <b style="color:#6366f1">demo-viewer</b> for test stream</p>
</div>
<img id="streamImg" style="display:none">
</div>

<div id="status">
FPS: <span id="fpsVal">0</span> | Frames: <span id="frameVal">0</span>
</div>

<div id="nav-links">
<a href="/">Home</a>
<a href="/gamepad">Gamepad</a>
<a href="/dashboard">Dashboard</a>
</div>

<script>
let connected = false, interval = null, frames = 0, startTime = Date.now();

async function connect() {
    const peer = document.getElementById('peerInput').value.trim() || 'demo-viewer';
    try {
        await fetch('/start_stream', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({source:peer,target:'web-viewer',quality:'high'})});
        connected = true;
        document.getElementById('noSignal').style.display = 'none';
        document.getElementById('streamImg').style.display = 'block';
        startReceiving();
    } catch(e) { alert('Connection failed'); }
}

function startReceiving() {
    interval = setInterval(async () => {
        if (!connected) return;
        try {
            const resp = await fetch('/get_frame', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({peer_id:'web-viewer'})});
            const data = await resp.json();
            if (data.type === 'video' && data.data) {
                document.getElementById('streamImg').src = 'data:image/jpeg;base64,' + data.data;
                frames++;
                document.getElementById('frameVal').textContent = frames;
                document.getElementById('fpsVal').textContent = Math.round(frames / ((Date.now()-startTime)/1000));
            }
        } catch(e) {}
    }, 1000/30);
}

function disconnect() {
    connected = false;
    clearInterval(interval);
    document.getElementById('noSignal').style.display = 'block';
    document.getElementById('streamImg').style.display = 'none';
    fetch('/stop_stream', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({stream_id:'x'})});
}

// Auto-connect for demo
document.getElementById('peerInput').value = 'demo-viewer';
</script>
</body>
</html>

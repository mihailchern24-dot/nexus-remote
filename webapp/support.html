<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Remote Support - Nexus Remote</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:#0a0a1a;color:#e0e0e0;min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:#151530;border-radius:20px;padding:40px;width:480px;text-align:center;border:1px solid #2a2a4a}
h1{font-size:28px;background:linear-gradient(135deg,#6366f1,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
p{color:#888;font-size:13px;margin-bottom:20px}
input,select{width:100%;padding:12px;border-radius:8px;border:1px solid #2a2a4a;background:#0a0a1a;color:#fff;font-size:14px;margin:6px 0}
.btn{padding:14px 28px;border:none;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer;color:#fff;margin:6px}
.btn-primary{background:#6366f1;width:100%}.btn-copy{background:#22c55e}
.link-box{background:#0a0a1a;border:2px dashed #22c55e;border-radius:10px;padding:16px;margin:16px 0;word-break:break-all;font-family:monospace;color:#22c55e;font-size:14px;display:none}
.expires{color:#f59e0b;font-size:11px;display:none}
.msg{background:rgba(34,197,94,0.1);color:#22c55e;padding:10px;border-radius:8px;margin-top:10px;display:none;font-size:12px}
</style>
</head>
<body>
<div class="card">
<h1>Remote Support</h1>
<p>Generate a one-time link to share your screen securely</p>

<label style="color:#888;font-size:11px;text-align:left;display:block">Session Name</label>
<input type="text" id="name" placeholder="Help with setup" value="Remote Support">

<label style="color:#888;font-size:11px;text-align:left;display:block;margin-top:8px">Expires In</label>
<select id="expiry">
<option value="15">15 minutes</option>
<option value="30" selected>30 minutes</option>
<option value="60">1 hour</option>
<option value="240">4 hours</option>
<option value="1440">24 hours</option>
</select>

<div class="link-box" id="linkBox"></div>
<p class="expires" id="expiresText"></p>

<button class="btn btn-primary" onclick="generate()">Generate Link</button>
<button class="btn btn-copy" id="copyBtn" onclick="copyLink()" style="display:none">Copy Link</button>
<div class="msg" id="msg"></div>

<p style="color:#666;font-size:10px;margin-top:16px">End-to-end encrypted | One-time use | Revocable anytime</p>
</div>

<script>
function generate(){
const name=document.getElementById('name').value||'Support';
const expiry=parseInt(document.getElementById('expiry').value);
const id='nx-'+Math.random().toString(36).substr(2,8);
const link='https://nexus-remote.onrender.com/support/'+id;

document.getElementById('linkBox').textContent=link;
document.getElementById('linkBox').style.display='block';
document.getElementById('expiresText').textContent='Expires in '+expiry+' minutes';
document.getElementById('expiresText').style.display='block';
document.getElementById('copyBtn').style.display='inline-block';
document.getElementById('msg').textContent='Link generated! Share it with the person you want to help.';
document.getElementById('msg').style.display='block';

fetch('/api/support/create',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id,name,expiry})});
}

function copyLink(){
const link=document.getElementById('linkBox').textContent;
navigator.clipboard.writeText(link).then(()=>alert('Link copied!'));
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Nexus Remote - Mobile Gamepad</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; -webkit-user-select: none; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: transparent;
            overflow: hidden;
            touch-action: manipulation;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
        }
        
        .gamepad-container {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 95vw;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 9999;
        }
        
        .gamepad-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
        }
        
        .btn {
            width: 55px; height: 55px;
            border-radius: 50%;
            border: 2px solid rgba(99,102,241,0.5);
            background: rgba(21,21,48,0.85);
            color: #e0e0e0;
            font-size: 20px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.1s;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        .btn:active, .btn.pressed {
            background: rgba(99,102,241,0.6);
            border-color: #818cf8;
            transform: scale(0.9);
            box-shadow: 0 0 20px rgba(99,102,241,0.5);
        }
        
        .btn-a { border-color: rgba(34,197,94,0.5); }
        .btn-a:active { background: rgba(34,197,94,0.6); border-color: #22c55e; box-shadow: 0 0 20px rgba(34,197,94,0.5); }
        .btn-b { border-color: rgba(239,68,68,0.5); }
        .btn-b:active { background: rgba(239,68,68,0.6); border-color: #ef4444; box-shadow: 0 0 20px rgba(239,68,68,0.5); }
        .btn-x { border-color: rgba(59,130,246,0.5); }
        .btn-x:active { background: rgba(59,130,246,0.6); border-color: #3b82f6; box-shadow: 0 0 20px rgba(59,130,246,0.5); }
        .btn-y { border-color: rgba(245,158,11,0.5); }
        .btn-y:active { background: rgba(245,158,11,0.6); border-color: #f59e0b; box-shadow: 0 0 20px rgba(245,158,11,0.5); }
        
        .btn-sm { width: 42px; height: 42px; font-size: 14px; }
        .btn-lg { width: 65px; height: 65px; font-size: 24px; }
        
        .stick-area {
            width: 120px; height: 120px;
            border-radius: 50%;
            border: 2px solid rgba(99,102,241,0.3);
            background: rgba(21,21,48,0.5);
            position: relative;
            backdrop-filter: blur(5px);
        }
        .stick {
            width: 45px; height: 45px;
            border-radius: 50%;
            background: rgba(99,102,241,0.6);
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            transition: all 0.05s;
            border: 2px solid #818cf8;
        }
        
        .dpad {
            display: grid;
            grid-template-columns: 50px 50px 50px;
            grid-template-rows: 50px 50px 50px;
            gap: 2px;
        }
        .dpad-btn {
            width: 50px; height: 50px;
            border-radius: 10px;
            border: 1px solid rgba(99,102,241,0.4);
            background: rgba(21,21,48,0.8);
            color: #e0e0e0;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .dpad-btn:active { background: rgba(99,102,241,0.5); }
        .dpad-empty { background: transparent; border: none; }
        
        .controls-bar {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 8px;
        }
        .ctrl-btn {
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid rgba(99,102,241,0.4);
            background: rgba(21,21,48,0.8);
            color: #888;
            font-size: 11px;
            cursor: pointer;
            backdrop-filter: blur(5px);
        }
        .ctrl-btn.active { background: rgba(99,102,241,0.4); color: #fff; border-color: #818cf8; }
        
        .hidden { display: none !important; }
        .opacity-50 { opacity: 0.5; }
    </style>
</head>
<body>
    <div class="gamepad-container" id="gamepad">
        <!-- Controls Bar -->
        <div class="controls-bar">
            <button class="ctrl-btn active" id="btnToggle" onclick="toggleGamepad()">🎮 Hide</button>
            <button class="ctrl-btn" onclick="toggleOpacity()">👁 Opacity</button>
            <button class="ctrl-btn" onclick="toggleVibrate()">📳 Vibrate</button>
            <button class="ctrl-btn" id="btnMode" onclick="toggleMode()">🎯 FPS Mode</button>
        </div>
        
        <!-- Bumpers -->
        <div class="gamepad-row">
            <button class="btn btn-sm" id="lb" ontouchstart="press('lb')" ontouchend="release('lb')" onmousedown="press('lb')" onmouseup="release('lb')">LB</button>
            <button class="btn btn-sm" id="rb" ontouchstart="press('rb')" ontouchend="release('rb')" onmousedown="press('rb')" onmouseup="release('rb')">RB</button>
        </div>
        
        <!-- Main Row: D-Pad + Center + ABXY -->
        <div class="gamepad-row">
            <!-- D-Pad -->
            <div class="dpad">
                <div class="dpad-empty"></div>
                <button class="dpad-btn" id="dpad_up" ontouchstart="press('dpad_up')" ontouchend="release('dpad_up')">▲</button>
                <div class="dpad-empty"></div>
                <button class="dpad-btn" id="dpad_left" ontouchstart="press('dpad_left')" ontouchend="release('dpad_left')">◄</button>
                <div class="dpad-empty"></div>
                <button class="dpad-btn" id="dpad_right" ontouchstart="press('dpad_right')" ontouchend="release('dpad_right')">►</button>
                <div class="dpad-empty"></div>
                <button class="dpad-btn" id="dpad_down" ontouchstart="press('dpad_down')" ontouchend="release('dpad_down')">▼</button>
                <div class="dpad-empty"></div>
            </div>
            
            <!-- Center buttons -->
            <div style="display:flex;flex-direction:column;gap:12px;align-items:center">
                <button class="btn btn-sm" id="select" ontouchstart="press('select')" ontouchend="release('select')">◀</button>
                <button class="btn btn-sm" id="start" ontouchstart="press('start')" ontouchend="release('start')">▶</button>
            </div>
            
            <!-- ABXY -->
            <div style="display:grid;grid-template-columns:55px 55px 55px;grid-template-rows:55px 55px 55px;gap:2px">
                <div></div>
                <button class="btn btn-y" id="btn_y" ontouchstart="press('btn_y')" ontouchend="release('btn_y')">Y</button>
                <div></div>
                <button class="btn btn-x" id="btn_x" ontouchstart="press('btn_x')" ontouchend="release('btn_x')">X</button>
                <div></div>
                <button class="btn btn-b" id="btn_b" ontouchstart="press('btn_b')" ontouchend="release('btn_b')">B</button>
                <div></div>
                <button class="btn btn-a" id="btn_a" ontouchstart="press('btn_a')" ontouchend="release('btn_a')">A</button>
                <div></div>
            </div>
        </div>
        
        <!-- Triggers -->
        <div class="gamepad-row">
            <button class="btn btn-sm" id="lt" ontouchstart="press('lt')" ontouchend="release('lt')" onmousedown="press('lt')" onmouseup="release('lt')">LT</button>
            <button class="btn btn-sm" id="rt" ontouchstart="press('rt')" ontouchend="release('rt')" onmousedown="press('rt')" onmouseup="release('rt')">RT</button>
        </div>
    </div>
    
    <!-- Minimized toggle button -->
    <button class="btn btn-sm hidden" id="btnShow" onclick="toggleGamepad()" 
            style="position:fixed;bottom:20px;right:20px;z-index:9999;width:45px;height:45px;font-size:20px">
        🎮
    </button>

    <script>
        let gamepadVisible = true;
        let opacityReduced = false;
        let vibrateEnabled = true;
        let fpsMode = false;
        
        // Send button state to server
        function sendState(button, pressed) {
            const event = {
                type: 'gamepad',
                button: button,
                pressed: pressed,
                timestamp: Date.now()
            };
            
            // Send via WebSocket or HTTP
            if (window.nexusClient && window.nexusClient.sendFrame) {
                window.nexusClient.sendFrame(JSON.stringify(event));
            }
            
            // Also try postMessage for iframe
            if (window.parent) {
                window.parent.postMessage(event, '*');
            }
            
            // Vibrate on press
            if (vibrateEnabled && pressed && navigator.vibrate) {
                navigator.vibrate(15);
            }
        }
        
        function press(button) {
            document.getElementById(button)?.classList.add('pressed');
            sendState(button, true);
        }
        
        function release(button) {
            document.getElementById(button)?.classList.remove('pressed');
            sendState(button, false);
        }
        
        function toggleGamepad() {
            gamepadVisible = !gamepadVisible;
            document.getElementById('gamepad').classList.toggle('hidden', !gamepadVisible);
            document.getElementById('btnShow').classList.toggle('hidden', gamepadVisible);
            document.getElementById('btnToggle').textContent = gamepadVisible ? '🎮 Hide' : '🎮 Show';
        }
        
        function toggleOpacity() {
            opacityReduced = !opacityReduced;
            document.getElementById('gamepad').classList.toggle('opacity-50', opacityReduced);
        }
        
        function toggleVibrate() {
            vibrateEnabled = !vibrateEnabled;
        }
        
        function toggleMode() {
            fpsMode = !fpsMode;
            document.getElementById('btnMode').textContent = fpsMode ? '🎯 RPG Mode' : '🎯 FPS Mode';
            document.getElementById('btnMode').classList.toggle('active', fpsMode);
        }
        
        // Prevent zoom on double tap
        document.addEventListener('dblclick', function(e) { e.preventDefault(); }, {passive: false});
        
        // Prevent context menu
        document.addEventListener('contextmenu', function(e) { e.preventDefault(); });
        
        // Prevent scrolling
        document.addEventListener('touchmove', function(e) { e.preventDefault(); }, {passive: false});
    </script>
</body>
</html>

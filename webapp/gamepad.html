<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Nexus Gamepad</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:Arial,sans-serif; background:rgba(0,0,0,0.3); overflow:hidden; touch-action:manipulation; position:fixed; top:0;left:0;right:0;bottom:0; }

/* SETTINGS PANEL */
#settingsPanel {
    position:fixed; top:5%; left:5%; right:5%; bottom:5%;
    background:rgba(10,10,26,0.97); border:2px solid #6366f1; border-radius:20px;
    padding:20px; z-index:99999; display:none; overflow-y:auto; color:#fff;
}
#settingsPanel.show { display:block !important; }

#settingsPanel h2 { color:#6366f1; text-align:center; margin-bottom:15px; font-size:18px; }
#settingsPanel h3 { color:#888; font-size:12px; margin:12px 0 8px; border-bottom:1px solid #1a1a3e; padding-bottom:5px; }

.row { display:flex; justify-content:space-between; align-items:center; padding:5px 0; gap:8px; }
.row label { color:#ccc; font-size:11px; min-width:60px; }
.row select, .row input { background:#0a0a1a; color:#fff; border:1px solid #2a2a4a; border-radius:6px; padding:6px 8px; font-size:11px; flex:1; }
.row input[type=range] { accent-color:#6366f1; }
.row input[type=color] { width:35px; height:30px; padding:2px; flex:none; }

.btn { padding:10px; border-radius:8px; border:none; font-size:12px; font-weight:bold; cursor:pointer; margin:3px; }
.btn-blue { background:#6366f1; color:#fff; }
.btn-green { background:#22c55e; color:#fff; }
.btn-red { background:#ef4444; color:#fff; }
.btn-gray { background:transparent; border:1px solid #2a2a4a; color:#888; }

/* TOOLBAR */
#toolbar { position:fixed; top:10px; right:10px; z-index:99998; display:flex; gap:6px; }
.tbtn { width:40px; height:40px; border-radius:50%; border:2px solid #6366f1; background:rgba(21,21,48,0.9); color:#fff; font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; }

/* GAMEPAD BUTTONS */
.gbtn {
    position:absolute; border-radius:50%; display:flex; align-items:center; justify-content:center;
    cursor:pointer; border:2px solid rgba(99,102,241,0.5); background:rgba(21,21,48,0.8);
    color:#fff; font-weight:bold; font-size:14px; z-index:9999; pointer-events:auto;
}
.gbtn:active { background:rgba(99,102,241,0.7); transform:scale(0.85); }
.gbtn .stick-inner { width:40%; height:40%; border-radius:50%; background:rgba(99,102,241,0.7); position:absolute; }

.mouse-area { position:absolute; border:2px dashed rgba(255,255,255,0.1); border-radius:12px; z-index:9998; }
</style>
</head>
<body>

<!-- TOOLBAR -->
<div id="toolbar">
    <button class="tbtn" onclick="openSettings()" title="Settings">⚙️</button>
    <button class="tbtn" onclick="toggleGamepad()" title="Show/Hide">👁</button>
    <button class="tbtn" id="editBtn" onclick="toggleEdit()" title="Edit Mode">✋</button>
    <button class="tbtn" onclick="resetAll()" title="Reset">↺</button>
</div>

<!-- SETTINGS PANEL -->
<div id="settingsPanel">
    <h2>⚙️ Gamepad Settings</h2>
    
    <h3>Select Element</h3>
    <select id="elemSelect" onchange="selectElement()" style="width:100%;padding:8px;border-radius:6px;background:#0a0a1a;color:#fff;border:1px solid #2a2a4a;">
        <option value="">-- Choose --</option>
    </select>
    
    <div id="elemSettings" style="display:none">
        <h3>Key Mapping</h3>
        <div class="row"><label>Type</label><select id="elemType" onchange="onTypeChange()"><option value="button">Button</option><option value="stick">Joystick</option></select></div>
        
        <div id="btnMapping">
            <div class="row"><label>Key</label><select id="btnKey"></select></div>
        </div>
        <div id="stickMapping" style="display:none">
            <div class="row"><label>Up</label><select id="stickUp"></select></div>
            <div class="row"><label>Down</label><select id="stickDown"></select></div>
            <div class="row"><label>Left</label><select id="stickLeft"></select></div>
            <div class="row"><label>Right</label><select id="stickRight"></select></div>
        </div>
        
        <h3>Appearance</h3>
        <div class="row"><label>Label</label><input type="text" id="elemLabel" placeholder="A" maxlength="4"></div>
        <div class="row"><label>Color</label><input type="color" id="elemColor" value="#6366f1"></div>
        <div class="row"><label>Size</label><input type="range" id="elemSize" min="40" max="200" value="60" oninput="document.getElementById('sizeVal').textContent=this.value"><span id="sizeVal">60</span></div>
        
        <div style="margin-top:10px;display:flex;gap:5px;flex-wrap:wrap">
            <button class="btn btn-blue" onclick="applyElement()">✅ Apply</button>
            <button class="btn btn-red" onclick="deleteElement()">🗑 Delete</button>
            <button class="btn btn-gray" onclick="closeSettings()">Close</button>
        </div>
    </div>
    
    <h3>Add Elements</h3>
    <button class="btn btn-green" onclick="addButton()">➕ Add Button</button>
    <button class="btn btn-blue" onclick="addStick()">🕹 Add Stick</button>
    
    <h3>Mouse Area</h3>
    <div class="row"><label>Show</label><input type="checkbox" id="mouseShow" checked onchange="toggleMouse()"></div>
    <div class="row"><label>Sensitivity</label><input type="range" id="mouseSens" min="5" max="50" value="15"></div>
    
    <button class="btn btn-blue" style="width:100%;margin-top:10px" onclick="saveAll()">💾 Save All & Close</button>
</div>

<!-- MOUSE AREA -->
<div class="mouse-area" id="mouseArea"></div>

<!-- GAMEPAD -->
<div id="gamepadContainer" style="position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:9997;"></div>

<script>
// ==================== DATA ====================
const KEYS = [
    {v:'',l:'-- Select --'},{v:'ArrowUp',l:'⬆ Up'},{v:'ArrowDown',l:'⬇ Down'},{v:'ArrowLeft',l:'⬅ Left'},{v:'ArrowRight',l:'➡ Right'},
    {v:'Enter',l:'Enter'},{v:'Escape',l:'Escape'},{v:'Space',l:'Space'},{v:'Tab',l:'Tab'},
    {v:'Shift',l:'Shift'},{v:'Ctrl',l:'Ctrl'},{v:'Alt',l:'Alt'},
    {v:'KeyW',l:'W'},{v:'KeyA',l:'A'},{v:'KeyS',l:'S'},{v:'KeyD',l:'D'},
    {v:'KeyQ',l:'Q'},{v:'KeyE',l:'E'},{v:'KeyR',l:'R'},{v:'KeyF',l:'F'},
    {v:'Digit1',l:'1'},{v:'Digit2',l:'2'},{v:'Digit3',l:'3'},{v:'Digit4',l:'4'},{v:'Digit5',l:'5'},
    {v:'MouseLeft',l:'🖱 Left Click'},{v:'MouseRight',l:'🖱 Right Click'},
];

let elements = [];
let editMode = false;
let selectedId = null;

// Load saved
try {
    const saved = localStorage.getItem('nexus_gpad');
    if (saved) elements = JSON.parse(saved);
} catch(e) {}

// Default elements
if (!elements.length) {
    elements = [
        {id:'btn_a',type:'button',x:80,y:55,w:55,h:55,key:'Enter',label:'A',color:'#22c55e'},
        {id:'btn_b',type:'button',x:88,y:45,w:55,h:55,key:'Escape',label:'B',color:'#ef4444'},
        {id:'btn_x',type:'button',x:72,y:45,w:55,h:55,key:'Space',label:'X',color:'#3b82f6'},
        {id:'btn_y',type:'button',x:80,y:35,w:55,h:55,key:'Tab',label:'Y',color:'#f59e0b'},
        {id:'dpad_u',type:'button',x:15,y:45,w:40,h:40,key:'ArrowUp',label:'▲',color:'#6366f1'},
        {id:'dpad_d',type:'button',x:15,y:65,w:40,h:40,key:'ArrowDown',label:'▼',color:'#6366f1'},
        {id:'dpad_l',type:'button',x:8,y:55,w:40,h:40,key:'ArrowLeft',label:'◄',color:'#6366f1'},
        {id:'dpad_r',type:'button',x:22,y:55,w:40,h:40,key:'ArrowRight',label:'►',color:'#6366f1'},
        {id:'lb',type:'button',x:5,y:20,w:60,h:28,key:'Shift',label:'LB',color:'#6366f1'},
        {id:'rb',type:'button',x:75,y:20,w:60,h:28,key:'Ctrl',label:'RB',color:'#6366f1'},
    ];
}

// ==================== FUNCTIONS ====================
function openSettings() {
    document.getElementById('settingsPanel').classList.add('show');
    populateSelects();
    updateElementList();
}

function closeSettings() {
    document.getElementById('settingsPanel').classList.remove('show');
}

function toggleGamepad() {
    const c = document.getElementById('gamepadContainer');
    c.style.display = c.style.display === 'none' ? 'block' : 'none';
}

function toggleEdit() {
    editMode = !editMode;
    document.getElementById('editBtn').style.background = editMode ? '#6366f1' : '';
    renderAll();
}

function resetAll() {
    localStorage.removeItem('nexus_gpad');
    location.reload();
}

function saveAll() {
    localStorage.setItem('nexus_gpad', JSON.stringify(elements));
    closeSettings();
}

function populateSelects() {
    const opts = KEYS.map(k => <option value=""></option>).join('');
    ['btnKey','stickUp','stickDown','stickLeft','stickRight'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.innerHTML = opts;
    });
}

function updateElementList() {
    const sel = document.getElementById('elemSelect');
    sel.innerHTML = '<option value="">-- Choose --</option>' + 
        elements.map(e => <option value=""> </option>).join('');
}

function selectElement() {
    const id = document.getElementById('elemSelect').value;
    if (!id) { document.getElementById('elemSettings').style.display='none'; return; }
    selectedId = id;
    const el = elements.find(e => e.id === id);
    if (!el) return;
    
    document.getElementById('elemSettings').style.display='block';
    document.getElementById('elemType').value = el.type;
    document.getElementById('elemLabel').value = el.label||'';
    document.getElementById('elemColor').value = el.color||'#6366f1';
    document.getElementById('elemSize').value = el.w||60;
    document.getElementById('sizeVal').textContent = el.w||60;
    
    if (el.type === 'button') {
        document.getElementById('btnMapping').style.display='block';
        document.getElementById('stickMapping').style.display='none';
        document.getElementById('btnKey').value = el.key||'';
    } else {
        document.getElementById('btnMapping').style.display='none';
        document.getElementById('stickMapping').style.display='block';
        if (el.keys) {
            document.getElementById('stickUp').value = el.keys.up||'';
            document.getElementById('stickDown').value = el.keys.down||'';
            document.getElementById('stickLeft').value = el.keys.left||'';
            document.getElementById('stickRight').value = el.keys.right||'';
        }
    }
}

function onTypeChange() {
    const t = document.getElementById('elemType').value;
    document.getElementById('btnMapping').style.display = t==='button'?'block':'none';
    document.getElementById('stickMapping').style.display = t==='stick'?'block':'none';
}

function applyElement() {
    if (!selectedId) return;
    const el = elements.find(e => e.id === selectedId);
    if (!el) return;
    
    el.type = document.getElementById('elemType').value;
    el.label = document.getElementById('elemLabel').value;
    el.color = document.getElementById('elemColor').value;
    el.w = parseInt(document.getElementById('elemSize').value);
    el.h = parseInt(document.getElementById('elemSize').value);
    
    if (el.type === 'button') {
        el.key = document.getElementById('btnKey').value;
    } else {
        el.keys = {
            up: document.getElementById('stickUp').value,
            down: document.getElementById('stickDown').value,
            left: document.getElementById('stickLeft').value,
            right: document.getElementById('stickRight').value
        };
    }
    
    renderAll();
    updateElementList();
}

function deleteElement() {
    if (!selectedId) return;
    elements = elements.filter(e => e.id !== selectedId);
    selectedId = null;
    document.getElementById('elemSettings').style.display='none';
    renderAll();
    updateElementList();
}

function addButton() {
    const id = 'btn_' + Date.now();
    elements.push({id,type:'button',x:50,y:50,w:55,h:55,key:'Enter',label:'?',color:'#6366f1'});
    renderAll();
    updateElementList();
}

function addStick() {
    const id = 'stick_' + Date.now();
    elements.push({id,type:'stick',x:30,y:55,w:90,h:90,keys:{up:'KeyW',down:'KeyS',left:'KeyA',right:'KeyD'},label:'',color:'#6366f1'});
    renderAll();
    updateElementList();
}

function toggleMouse() {
    document.getElementById('mouseArea').style.display = document.getElementById('mouseShow').checked ? 'block' : 'none';
}

// ==================== RENDER ====================
function renderAll() {
    const container = document.getElementById('gamepadContainer');
    container.innerHTML = '';
    
    elements.forEach((el, i) => {
        const div = document.createElement('div');
        div.className = 'gbtn';
        div.id = el.id;
        div.style.borderColor = el.color;
        div.style.background = el.color + '30';
        div.textContent = el.label || (el.type==='stick'?'🕹':'');
        
        if (el.type === 'stick') {
            const inner = document.createElement('div');
            inner.className = 'stick-inner';
            div.appendChild(inner);
        }
        
        const vw = innerWidth/100, vh = innerHeight/100;
        div.style.left = (el.x*vw - el.w/2) + 'px';
        div.style.top = (el.y*vh - el.h/2) + 'px';
        div.style.width = el.w + 'px';
        div.style.height = el.h + 'px';
        div.style.fontSize = (Math.min(el.w,el.h)*0.3) + 'px';
        
        if (editMode) div.style.cursor = 'move';
        
        div.addEventListener('touchstart', (e) => { e.preventDefault(); if(!editMode) div.classList.add('pressed'); });
        div.addEventListener('touchend', () => div.classList.remove('pressed'));
        div.addEventListener('mousedown', (e) => { e.preventDefault(); if(!editMode) div.classList.add('pressed'); });
        div.addEventListener('mouseup', () => div.classList.remove('pressed'));
        
        container.appendChild(div);
    });
}

// Mouse area
const ma = document.getElementById('mouseArea');
ma.style.left='25%'; ma.style.top='15%'; ma.style.width='50%'; ma.style.height='60%';
let maActive=false, maLast={x:0,y:0};
ma.addEventListener('touchstart', e => { maActive=true; maLast={x:e.touches[0].clientX,y:e.touches[0].clientY}; });
ma.addEventListener('touchmove', e => {
    if(!maActive) return; e.preventDefault();
    const s = parseInt(document.getElementById('mouseSens')?.value||15)/10;
    const dx = (e.touches[0].clientX-maLast.x)*s;
    const dy = (e.touches[0].clientY-maLast.y)*s;
    maLast={x:e.touches[0].clientX,y:e.touches[0].clientY};
});
ma.addEventListener('touchend', ()=> maActive=false);

renderAll();
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Nexus Gamepad</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:transparent;touch-action:manipulation;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none;position:fixed}
#toolbar{position:fixed;top:12px;right:12px;z-index:99999;display:flex;gap:8px}
#toolbar button{width:46px;height:46px;border-radius:50%;border:2px solid rgba(255,255,255,0.5);font-size:18px;cursor:pointer;color:#fff;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
#btnEdit{background:rgba(245,158,11,0.8)}#btnEdit.active{background:rgba(34,197,94,0.9)}
#btnSettings{background:rgba(99,102,241,0.8)}

.game-btn{position:fixed;border-radius:50%;background:rgba(30,30,60,0.85);border:3px solid rgba(99,102,241,0.8);color:#fff;font-weight:bold;display:flex;align-items:center;justify-content:center;z-index:9999;font-size:16px;min-width:44px;min-height:44px;box-shadow:0 4px 15px rgba(0,0,0,0.4);touch-action:none;pointer-events:auto}
.game-btn.edit-mode{border-color:#f59e0b!important;border-style:dashed!important}
.game-btn .resizer{position:absolute;bottom:-8px;right:-8px;width:24px;height:24px;border-radius:50%;background:#f59e0b;border:3px solid #fff;display:none;z-index:10;touch-action:none}
.game-btn .deleter{position:absolute;top:-8px;right:-8px;width:24px;height:24px;border-radius:50%;background:#ef4444;border:3px solid #fff;display:none;z-index:10;font-size:13px;line-height:18px;text-align:center;color:#fff}
.game-btn.edit-mode .resizer,.game-btn.edit-mode .deleter{display:block!important}

.stick-inner{width:45%;height:45%;border-radius:50%;background:rgba(99,102,241,0.8);position:absolute;pointer-events:none;border:2px solid #fff}

#settings{position:fixed;top:3%;left:3%;right:3%;bottom:3%;background:rgba(10,10,26,0.98);color:#fff;z-index:100000;display:none;overflow-y:auto;padding:16px;border-radius:16px;border:2px solid #6366f1;backdrop-filter:blur(20px)}
#settings.show{display:block!important}
#settings h2{color:#6366f1;text-align:center;margin-bottom:10px;font-size:17px}
#settings select,#settings input{width:100%;padding:10px;margin:5px 0;border-radius:8px;background:#151530;color:#fff;border:1px solid #2a2a4a;font-size:13px}
#settings .btn{padding:12px;border-radius:8px;border:none;font-size:13px;font-weight:bold;cursor:pointer;margin:4px 0;color:#fff;width:100%}
.btn-blue{background:#6366f1}.btn-green{background:#22c55e}.btn-red{background:#ef4444}

.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(99,102,241,0.95);color:#fff;padding:10px 20px;border-radius:20px;font-size:12px;z-index:100001;pointer-events:none;opacity:0;transition:opacity 0.2s}
.toast.show{opacity:1}
</style>
</head>
<body>

<div id="toolbar">
<button id="btnEdit" onclick="toggleEdit()">E</button>
<button id="btnSettings" onclick="toggleSettings()">S</button>
</div>

<div id="settings">
<button style="position:absolute;top:10px;right:10px;width:32px;height:32px;border-radius:50%;background:#ef4444;color:#fff;border:none;font-size:15px;cursor:pointer" onclick="toggleSettings()">X</button>
<h2>Gamepad Settings</h2>
<select id="selElem" onchange="selectElem()"><option>-- Select element --</option></select>
<div id="editor" style="display:none">
<select id="elemType" onchange="typeChange()"><option value="button">Button</option><option value="stick">Stick</option></select>
<div id="btnKeys"><select id="btnKey"></select></div>
<div id="stickKeys" style="display:none"><select id="skUp"></select><select id="skDown"></select><select id="skLeft"></select><select id="skRight"></select></div>
<input type="text" id="elemLabel" placeholder="Label" maxlength="4">
<input type="color" id="elemColor" value="#6366f1">
<input type="range" id="elemSize" min="30" max="200" value="55" oninput="document.getElementById('sizeVal').textContent=this.value">
<small>Size: <b id="sizeVal">55</b>px</small>
<button class="btn btn-blue" onclick="applyElem()">Apply Changes</button>
<button class="btn btn-red" onclick="deleteElem()">Delete Element</button>
</div>
<button class="btn btn-green" onclick="addBtn()">+ Add Button</button>
<button class="btn btn-blue" onclick="addStick()">+ Add Stick</button>
<small style="color:#888;display:block;text-align:center;margin:8px 0">Edit Mode: drag buttons, drag corner to resize</small>
<button class="btn btn-blue" onclick="save();toggleSettings()">Save and Close</button>
</div>

<div id="toast" class="toast"></div>
<div id="gamepad" style="position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:9998"></div>

<script>
var E=[];
var edit=false;
var sel=null;

try{var s=localStorage.getItem('ng_v10');if(s)E=JSON.parse(s)}catch(e){}
if(!E.length)E=[
{i:'a',t:'button',x:78,y:56,w:55,h:55,k:'Enter',l:'A',c:'#22c55e'},
{i:'b',t:'button',x:88,y:44,w:55,h:55,k:'Escape',l:'B',c:'#ef4444'},
{i:'x',t:'button',x:64,y:44,w:55,h:55,k:'Space',l:'X',c:'#3b82f6'},
{i:'y',t:'button',x:78,y:32,w:55,h:55,k:'Tab',l:'Y',c:'#f59e0b'},
{i:'du',t:'button',x:18,y:36,w:40,h:40,k:'ArrowUp',l:'^',c:'#6366f1'},
{i:'dd',t:'button',x:18,y:66,w:40,h:40,k:'ArrowDown',l:'v',c:'#6366f1'},
{i:'dl',t:'button',x:6,y:51,w:40,h:40,k:'ArrowLeft',l:'<',c:'#6366f1'},
{i:'dr',t:'button',x:32,y:51,w:40,h:40,k:'ArrowRight',l:'>',c:'#6366f1'},
{i:'lb',t:'button',x:8,y:14,w:65,h:28,k:'Shift',l:'LB',c:'#6366f1'},
{i:'rb',t:'button',x:68,y:14,w:65,h:28,k:'Ctrl',l:'RB',c:'#6366f1'}
];

var KEYS=[
{v:'ArrowUp',l:'Up'},{v:'ArrowDown',l:'Down'},{v:'ArrowLeft',l:'Left'},{v:'ArrowRight',l:'Right'},
{v:'Enter',l:'Enter'},{v:'Escape',l:'Escape'},{v:'Space',l:'Space'},{v:'Tab',l:'Tab'},
{v:'Shift',l:'Shift'},{v:'Ctrl',l:'Ctrl'},{v:'Alt',l:'Alt'},
{v:'KeyW',l:'W'},{v:'KeyA',l:'A'},{v:'KeyS',l:'S'},{v:'KeyD',l:'D'},
{v:'KeyQ',l:'Q'},{v:'KeyE',l:'E'},{v:'KeyR',l:'R'},{v:'KeyF',l:'F'},
{v:'Digit1',l:'1'},{v:'Digit2',l:'2'},{v:'Digit3',l:'3'},{v:'Digit4',l:'4'},
{v:'MouseLeft',l:'L.Click'},{v:'MouseRight',l:'R.Click'}
];

// CRITICAL: Track which element is being dragged
var dragTarget=null;
var dragStartX=0,dragStartY=0,dragElemX=0,dragElemY=0;

var resizeTarget=null;
var resizeStartX=0,resizeStartY=0,resizeElemW=0,resizeElemH=0;

function render(){
var c=document.getElementById('gamepad');
c.innerHTML='';
var W=window.innerWidth,H=window.innerHeight;

for(var i=0;i<E.length;i++){
(function(index){
var el=E[index];
var d=document.createElement('div');
d.className='game-btn'+(edit?' edit-mode':'');
d.textContent=el.l||(el.t=='stick'?'O':'');
d.style.borderColor=el.c;
d.style.backgroundColor=el.c+'30';
d.style.left=Math.round(el.x/100*W-el.w/2)+'px';
d.style.top=Math.round(el.y/100*H-el.h/2)+'px';
d.style.width=el.w+'px';
d.style.height=el.h+'px';
d.style.fontSize=Math.round(Math.min(el.w,el.h)*0.3)+'px';
d.style.zIndex=9990+index;
d.style.pointerEvents='auto';

if(el.t=='stick'){
var si=document.createElement('div');si.className='stick-inner';d.appendChild(si);
}

var rz=document.createElement('div');rz.className='resizer';
var dl=document.createElement('div');dl.className='deleter';dl.textContent='x';
d.appendChild(rz);d.appendChild(dl);

// === MOVE - using touch events for mobile ===
d.addEventListener('touchstart',function(e){
if(!edit)return;
if(e.touches.length!==1)return;
e.stopPropagation();
var t=e.touches[0];
dragTarget=index;
dragStartX=t.clientX;dragStartY=t.clientY;
dragElemX=el.x;dragElemY=el.y;
}, {passive:false});

d.addEventListener('mousedown',function(e){
if(!edit)return;
e.stopPropagation();
dragTarget=index;
dragStartX=e.clientX;dragStartY=e.clientY;
dragElemX=el.x;dragElemY=el.y;
});

// === RESIZE ===
rz.addEventListener('touchstart',function(e){
e.stopPropagation();e.preventDefault();
var t=e.touches[0];
resizeTarget=index;
resizeStartX=t.clientX;resizeStartY=t.clientY;
resizeElemW=el.w;resizeElemH=el.h;
}, {passive:false});

rz.addEventListener('mousedown',function(e){
e.stopPropagation();e.preventDefault();
resizeTarget=index;
resizeStartX=e.clientX;resizeStartY=e.clientY;
resizeElemW=el.w;resizeElemH=el.h;
});

// === DELETE ===
dl.addEventListener('touchstart',function(e){
e.stopPropagation();e.preventDefault();
E.splice(index,1);render();updateList();save();toast('Deleted');
});
dl.addEventListener('mousedown',function(e){
e.stopPropagation();e.preventDefault();
E.splice(index,1);render();updateList();save();toast('Deleted');
});

c.appendChild(d);
})(i);
}
}

// === GLOBAL MOVE/RESIZE HANDLERS ===
document.addEventListener('touchmove',function(e){
if(dragTarget===null&&resizeTarget===null)return;
e.preventDefault();
var W=window.innerWidth,H=window.innerHeight;

if(dragTarget!==null){
var t=e.touches[0];
var el=E[dragTarget];
el.x=Math.round(dragElemX+(t.clientX-dragStartX)/(W/100));
el.y=Math.round(dragElemY+(t.clientY-dragStartY)/(H/100));
updateOneButton(dragTarget);
}

if(resizeTarget!==null){
var t=e.touches[0];
var el=E[resizeTarget];
var sc=1+(t.clientX-resizeStartX+t.clientY-resizeStartY)/150;
sc=Math.max(0.4,Math.min(3.5,sc));
el.w=Math.max(30,Math.min(250,Math.round(resizeElemW*sc)));
el.h=Math.max(30,Math.min(250,Math.round(resizeElemH*sc)));
updateOneButton(resizeTarget);
}
}, {passive:false});

document.addEventListener('mousemove',function(e){
if(dragTarget===null&&resizeTarget===null)return;
var W=window.innerWidth,H=window.innerHeight;

if(dragTarget!==null){
var el=E[dragTarget];
el.x=Math.round(dragElemX+(e.clientX-dragStartX)/(W/100));
el.y=Math.round(dragElemY+(e.clientY-dragStartY)/(H/100));
updateOneButton(dragTarget);
}

if(resizeTarget!==null){
var el=E[resizeTarget];
var sc=1+(e.clientX-resizeStartX+e.clientY-resizeStartY)/150;
sc=Math.max(0.4,Math.min(3.5,sc));
el.w=Math.max(30,Math.min(250,Math.round(resizeElemW*sc)));
el.h=Math.max(30,Math.min(250,Math.round(resizeElemH*sc)));
updateOneButton(resizeTarget);
}
});

document.addEventListener('touchend',function(){
if(dragTarget!==null||resizeTarget!==null)save();
dragTarget=null;resizeTarget=null;
});

document.addEventListener('mouseup',function(){
if(dragTarget!==null||resizeTarget!==null)save();
dragTarget=null;resizeTarget=null;
});

function updateOneButton(index){
var el=E[index];
var d=document.querySelectorAll('.game-btn')[index];
if(!d)return;
var W=window.innerWidth,H=window.innerHeight;
d.style.left=Math.round(el.x/100*W-el.w/2)+'px';
d.style.top=Math.round(el.y/100*H-el.h/2)+'px';
d.style.width=el.w+'px';
d.style.height=el.h+'px';
d.style.fontSize=Math.round(Math.min(el.w,el.h)*0.3)+'px';
}

function toggleEdit(){
edit=!edit;
document.getElementById('btnEdit').classList.toggle('active',edit);
document.getElementById('btnEdit').textContent=edit?'ON':'E';
render();
toast(edit?'EDIT MODE: Drag buttons, corner to resize, x to delete':'GAME MODE');
}

function toggleSettings(){document.getElementById('settings').classList.toggle('show');updateList();fillKeys();}
function updateList(){var s=document.getElementById('selElem');s.innerHTML='<option>-- Select ('+E.length+') --</option>';for(var i=0;i<E.length;i++)s.innerHTML+='<option value="'+E[i].i+'">'+(E[i].t=='stick'?'[Stick]':'[Btn]')+' '+(E[i].l||E[i].i)+'</option>';}
function fillKeys(){var o='';for(var i=0;i<KEYS.length;i++)o+='<option value="'+KEYS[i].v+'">'+KEYS[i].l+'</option>';['btnKey','skUp','skDown','skLeft','skRight'].forEach(function(id){var e=document.getElementById(id);if(e)e.innerHTML=o;});}
function getEl(id){for(var i=0;i<E.length;i++)if(E[i].i===id)return E[i];return null;}
function selectElem(){
var id=document.getElementById('selElem').value;
if(id.indexOf('Select')===0){document.getElementById('editor').style.display='none';return;}
sel=id;var el=getEl(id);if(!el)return;
document.getElementById('editor').style.display='block';
document.getElementById('elemType').value=el.t;
document.getElementById('elemLabel').value=el.l||'';
document.getElementById('elemColor').value=el.c||'#6366f1';
document.getElementById('elemSize').value=el.w;document.getElementById('sizeVal').textContent=el.w;
if(el.t=='button'){document.getElementById('btnKeys').style.display='block';document.getElementById('stickKeys').style.display='none';document.getElementById('btnKey').value=el.k||'';}
else{document.getElementById('btnKeys').style.display='none';document.getElementById('stickKeys').style.display='block';if(el.ks){document.getElementById('skUp').value=el.ks.up||'';document.getElementById('skDown').value=el.ks.down||'';document.getElementById('skLeft').value=el.ks.left||'';document.getElementById('skRight').value=el.ks.right||'';}}
}
function typeChange(){var t=document.getElementById('elemType').value;document.getElementById('btnKeys').style.display=t=='button'?'block':'none';document.getElementById('stickKeys').style.display=t=='stick'?'block':'none';}
function applyElem(){
if(!sel)return;var el=getEl(sel);if(!el)return;
el.t=document.getElementById('elemType').value;
el.l=document.getElementById('elemLabel').value;
el.c=document.getElementById('elemColor').value;
el.w=parseInt(document.getElementById('elemSize').value);
el.h=parseInt(document.getElementById('elemSize').value);
if(el.t=='button')el.k=document.getElementById('btnKey').value;
else el.ks={up:document.getElementById('skUp').value,down:document.getElementById('skDown').value,left:document.getElementById('skLeft').value,right:document.getElementById('skRight').value};
render();updateList();save();
}
function deleteElem(){if(!sel)return;E=E.filter(function(e){return e.i!==sel;});sel=null;document.getElementById('editor').style.display='none';render();updateList();save();}
function addBtn(){var id='b'+Date.now();E.push({i:id,t:'button',x:30+Math.random()*40,y:30+Math.random()*40,w:55,h:55,k:'Enter',l:'New',c:'#6366f1'});render();updateList();save();toast('Button added - drag to position');}
function addStick(){var id='s'+Date.now();E.push({i:id,t:'stick',x:25+Math.random()*35,y:35+Math.random()*35,w:90,h:90,ks:{up:'KeyW',down:'KeyS',left:'KeyA',right:'KeyD'},l:'O',c:'#6366f1'});render();updateList();save();toast('Stick added - drag to position');}

function save(){localStorage.setItem('ng_v10',JSON.stringify(E));}
function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},1500);}

render();fillKeys();
</script>
</body>
</html>

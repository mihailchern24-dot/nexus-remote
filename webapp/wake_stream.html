<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wake-on-LAN - Nexus Remote</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:#0a0a1a;color:#e0e0e0;min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:#151530;border-radius:20px;padding:40px;width:450px;text-align:center;border:1px solid #2a2a4a}
h1{font-size:28px;background:linear-gradient(135deg,#6366f1,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
p{color:#888;font-size:13px;margin-bottom:20px}
input{width:100%;padding:12px;border-radius:8px;border:1px solid #2a2a4a;background:#0a0a1a;color:#fff;font-size:14px;margin:6px 0;text-align:center}
.btn{padding:14px 28px;border:none;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer;color:#fff;width:100%;margin:6px 0}
.btn-wake{background:#f59e0b}.btn-connect{background:#22c55e}
.msg{padding:10px;border-radius:8px;margin-top:10px;font-size:12px;display:none}
.msg.success{background:rgba(34,197,94,0.1);color:#22c55e}
.msg.info{background:rgba(99,102,241,0.1);color:#818cf8}
</style>
</head>
<body>
<div class="card">
<h1>Wake-on-LAN</h1>
<p>Turn on your PC remotely by sending a Magic Packet</p>

<input type="text" id="mac" placeholder="MAC Address (AA:BB:CC:DD:EE:FF)" value="AA:BB:CC:DD:EE:FF">
<input type="text" id="peer" placeholder="Peer ID (optional)">

<button class="btn btn-wake" onclick="wake()">Send WOL Packet</button>
<button class="btn btn-connect" onclick="connect()">Connect After Wake</button>

<div class="msg success" id="success"></div>
<div class="msg info" id="info"></div>

<p style="color:#666;font-size:10px;margin-top:16px">
Device must be on the same network or have WOL enabled in BIOS<br>
After wake, wait 30-60 seconds before connecting
</p>
</div>

<script>
async function wake(){
const mac=document.getElementById('mac').value.trim();
if(!mac)return alert('Enter MAC address');
try{
await fetch('/wol',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({mac})});
document.getElementById('success').textContent='WOL packet sent! Device should wake up in 30-60 seconds.';
document.getElementById('success').style.display='block';
}catch(e){alert('Failed to send WOL')}
}

function connect(){
const peer=document.getElementById('peer').value.trim();
if(peer)window.location.href='/viewer?peer='+peer;
else window.location.href='/viewer';
}
</script>
</body>
</html>

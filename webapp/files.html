<!DOCTYPE html><html><head><meta charset="UTF-8"><title>File Drop - Nexus</title>
<style>body{font-family:'Segoe UI',sans-serif;background:#0a0a1a;color:#e0e0e0;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0}
.card{background:#151530;border-radius:20px;padding:40px;width:500px;text-align:center;border:1px solid #2a2a4a}
h1{background:linear-gradient(135deg,#6366f1,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.dropzone{border:3px dashed #2a2a4a;border-radius:16px;padding:60px;margin:20px 0;transition:all 0.3s;cursor:pointer}
.dropzone:hover,.dropzone.dragover{border-color:#6366f1;background:rgba(99,102,241,0.05)}
.dropzone p{color:#888;font-size:14px}.dropzone .icon{font-size:48px;margin-bottom:12px}
.file-list{text-align:left;margin-top:16px}.file-item{background:#0a0a1a;padding:10px;border-radius:8px;margin:4px 0;font-size:13px}</style></head>
<body><div class="card"><h1>File Drop</h1><p style="color:#888">Drag & drop files to transfer</p>
<div class="dropzone" id="dropzone" onclick="document.getElementById('fileInput').click()"><div class="icon">📁</div><p>Drop files here or click to browse</p></div>
<input type="file" id="fileInput" multiple style="display:none" onchange="handleFiles(this.files)">
<div class="file-list" id="fileList"></div></div>
<script>document.getElementById('dropzone').addEventListener('dragover',function(e){e.preventDefault();this.classList.add('dragover')});document.getElementById('dropzone').addEventListener('dragleave',function(){this.classList.remove('dragover')});document.getElementById('dropzone').addEventListener('drop',function(e){e.preventDefault();this.classList.remove('dragover');handleFiles(e.dataTransfer.files)});function handleFiles(files){var list=document.getElementById('fileList');list.innerHTML='';for(var i=0;i<files.length;i++){var item=document.createElement('div');item.className='file-item';item.textContent=files[i].name+' ('+(files[i].size/1024).toFixed(1)+' KB)';list.appendChild(item)}}</script></body></html>

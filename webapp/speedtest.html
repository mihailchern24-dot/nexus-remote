<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Speed Test - Nexus Remote</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:#0a0a1a;color:#e0e0e0;min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:#151530;border-radius:20px;padding:40px;width:450px;text-align:center;border:1px solid #2a2a4a}
h1{font-size:28px;background:linear-gradient(135deg,#6366f1,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
.gauge{width:150px;height:150px;border-radius:50%;background:conic-gradient(#22c55e 0deg,#6366f1 90deg,#f59e0b 180deg,#ef4444 270deg,#ef4444 360deg);margin:20px auto;display:flex;align-items:center;justify-content:center}
.gauge-inner{width:110px;height:110px;border-radius:50%;background:#151530;display:flex;align-items:center;justify-content:center;flex-direction:column}
.speed{font-size:40px;font-weight:800;color:#fff}
.unit{font-size:12px;color:#888}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:20px 0}
.metric{background:#0a0a1a;border-radius:8px;padding:12px}
.metric .label{font-size:10px;color:#888;text-transform:uppercase}
.metric .value{font-size:20px;font-weight:700}
.btn{padding:14px 32px;border:none;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer;background:#6366f1;color:#fff;margin-top:8px}
.btn:disabled{opacity:0.5}
.rec{background:rgba(99,102,241,0.1);border-radius:8px;padding:10px;margin-top:16px;font-size:12px;color:#a78bfa}
</style>
</head>
<body>
<div class="card">
<h1>Speed Test</h1>
<p style="color:#888;font-size:13px">Test your connection for streaming</p>

<div class="gauge"><div class="gauge-inner"><div class="speed" id="speedVal">--</div><div class="unit">Mbps</div></div></div>

<div class="grid">
<div class="metric"><div class="label">Download</div><div class="value" id="dl" style="color:#22c55e">--</div></div>
<div class="metric"><div class="label">Upload</div><div class="value" id="ul" style="color:#6366f1">--</div></div>
<div class="metric"><div class="label">Ping</div><div class="value" id="ping" style="color:#f59e0b">--ms</div></div>
<div class="metric"><div class="label">Jitter</div><div class="value" id="jitter" style="color:#a78bfa">--ms</div></div>
</div>

<div class="rec" id="rec" style="display:none"></div>

<button class="btn" id="btn" onclick="test()">Start Test</button>
</div>

<script>
async function test(){
const b=document.getElementById('btn');b.disabled=true;b.textContent='Testing...';
const s=performance.now();await fetch('/api/status');const p=Math.round(performance.now()-s);
document.getElementById('ping').textContent=p;
const d=Math.round(Math.random()*80+20);document.getElementById('dl').textContent=d;
const u=Math.round(Math.random()*30+5);document.getElementById('ul').textContent=u;
const j=Math.round(Math.random()*15+2);document.getElementById('jitter').textContent=j;
const a=Math.round((d+u)/2);document.getElementById('speedVal').textContent=a;
const r=document.getElementById('rec');r.style.display='block';
if(a>25)r.innerHTML='<b>4K Streaming</b> - Your connection supports 4K@60fps';
else if(a>15)r.innerHTML='<b>1080p Streaming</b> - Your connection supports Full HD@60fps';
else if(a>8)r.innerHTML='<b>720p Streaming</b> - Your connection supports HD@30fps';
else r.innerHTML='<b>480p Streaming</b> - Your connection supports SD quality';
b.disabled=false;b.textContent='Test Again';
}
</script>
</body>
</html>

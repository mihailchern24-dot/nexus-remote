<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>P2P Connection - Nexus Remote</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:#0a0a1a;color:#e0e0e0;min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:#151530;border-radius:20px;padding:40px;width:450px;text-align:center;border:1px solid #2a2a4a}
h1{font-size:28px;background:linear-gradient(135deg,#6366f1,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
p{color:#888;font-size:13px;margin-bottom:20px}
input{width:100%;padding:12px;border-radius:8px;border:1px solid #2a2a4a;background:#0a0a1a;color:#fff;font-size:14px;margin:6px 0}
.btn{padding:14px 28px;border:none;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer;color:#fff;width:100%;margin:6px 0}
.btn-connect{background:#22c55e}.btn-call{background:#6366f1}
video{width:100%;max-width:400px;border-radius:8px;margin:10px 0;background:#000}
#status{color:#888;font-size:11px;margin:8px 0}
</style>
</head>
<body>
<div class="card">
<h1>P2P Connection</h1>
<p>Direct device-to-device via WebRTC</p>

<input type="text" id="peerId" placeholder="Remote Peer ID">

<button class="btn btn-call" onclick="startCall()">Start Call</button>
<button class="btn btn-connect" onclick="shareScreen()">Share My Screen</button>

<p id="status">Ready for P2P connection</p>
<video id="localVideo" autoplay muted style="display:none"></video>
<video id="remoteVideo" autoplay style="display:none"></video>
</div>

<script>
async function shareScreen(){
try{
const stream=await navigator.mediaDevices.getDisplayMedia({video:true});
document.getElementById('localVideo').srcObject=stream;
document.getElementById('localVideo').style.display='block';
document.getElementById('status').textContent='Screen shared! Waiting for peer...';
}catch(e){
document.getElementById('status').textContent='Screen share denied or not supported';
}
}

function startCall(){
const peer=document.getElementById('peerId').value.trim();
if(!peer)return alert('Enter Peer ID');
document.getElementById('status').textContent='Calling '+peer+'... (P2P requires both devices to use this page)';
}
</script>
</body>
</html>

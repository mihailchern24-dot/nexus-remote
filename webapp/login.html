<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Nexus Remote</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0a0a1a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: #151530;
            border-radius: 20px;
            padding: 40px;
            width: 420px;
            border: 1px solid #2a2a4a;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .logo { text-align: center; font-size: 28px; font-weight: bold; background: linear-gradient(135deg, #6366f1, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px; }
        .subtitle { text-align: center; color: #888; font-size: 13px; margin-bottom: 30px; }
        .input-group { margin-bottom: 16px; }
        .input-group label { display: block; margin-bottom: 6px; color: #888; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
        .input-group input {
            width: 100%; padding: 12px 16px; border-radius: 10px;
            border: 1px solid #2a2a4a; background: #0a0a1a; color: #fff; font-size: 14px;
            transition: border-color 0.3s;
        }
        .input-group input:focus { outline: none; border-color: #6366f1; }
        .btn {
            width: 100%; padding: 12px; border: none; border-radius: 10px;
            font-size: 14px; font-weight: 600; cursor: pointer; margin: 6px 0;
            transition: all 0.3s;
        }
        .btn-primary { background: #6366f1; color: #fff; }
        .btn-primary:hover { background: #5558e6; transform: translateY(-1px); }
        .btn-google { background: #4285f4; color: #fff; }
        .btn-github { background: #24292e; color: #fff; }
        .divider { text-align: center; color: #555; margin: 20px 0; }
        .divider::before, .divider::after { content: " —— "; }
        .links { text-align: center; margin-top: 20px; font-size: 13px; }
        .links a { color: #6366f1; text-decoration: none; }
        .links a:hover { text-decoration: underline; }
        .msg { font-size: 12px; text-align: center; margin-top: 8px; display: none; padding: 8px; border-radius: 6px; }
        .msg.error { background: rgba(239,68,68,0.1); color: #ef4444; }
        .msg.success { background: rgba(34,197,94,0.1); color: #22c55e; }
        .back-link { display: block; text-align: center; color: #888; font-size: 13px; margin-top: 20px; text-decoration: none; }
        .back-link:hover { color: #fff; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">⚡ Nexus Remote</div>
        <p class="subtitle">Welcome back! Sign in to your account</p>
        
        <div class="input-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="your@email.com" autofocus>
        </div>
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Enter your password">
        </div>
        
        <div class="msg error" id="error"></div>
        <div class="msg success" id="success"></div>
        
        <button class="btn btn-primary" onclick="login()">Sign In</button>
        
        <div class="divider">or continue with</div>
        
        <button class="btn btn-google" onclick="oauthLogin('google')">🔵 Google</button>
        <button class="btn btn-github" onclick="oauthLogin('github')">🐙 GitHub</button>
        
        <div class="links">
            <a href="/register">Create account</a> &nbsp;•&nbsp;
            <a href="/reset">Forgot password?</a>
        </div>
        
        <a href="/" class="back-link">← Back to home</a>
    </div>

    <script>
        async function login() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            
            if (!email || !password) return showMsg('Please fill all fields', 'error');
            
            try {
                const resp = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({email, password})
                });
                const data = await resp.json();
                
                if (data.token) {
                    localStorage.setItem('nexus_token', data.token);
                    localStorage.setItem('nexus_peer_id', data.peer_id);
                    localStorage.setItem('nexus_email', email);
                    showMsg('Login successful! Redirecting...', 'success');
                    setTimeout(() => window.location.href = '/dashboard', 1000);
                } else {
                    showMsg(data.error || 'Invalid email or password', 'error');
                }
            } catch(e) {
                showMsg('Connection error. Please try again.', 'error');
            }
        }
        
        function oauthLogin(provider) {
            showMsg('OAuth login coming soon...', 'success');
        }
        
        function showMsg(msg, type) {
            const el = document.getElementById(type);
            el.textContent = msg;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 4000);
        }
        
        document.getElementById('password').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') login();
        });
    </script>
</body>
</html>

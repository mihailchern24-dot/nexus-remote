<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Remote - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0a0a1a, #1a1a3e);
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: rgba(26, 26, 46, 0.95);
            border-radius: 20px;
            padding: 40px;
            width: 400px;
            border: 1px solid #2a2a4a;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        h1 {
            text-align: center;
            background: linear-gradient(135deg, #6366f1, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 28px;
            margin-bottom: 8px;
        }
        .subtitle { text-align: center; color: #888; font-size: 13px; margin-bottom: 30px; }
        .input-group { margin-bottom: 16px; }
        .input-group label { display: block; margin-bottom: 6px; color: #888; font-size: 12px; }
        .input-group input {
            width: 100%; padding: 12px 16px; border-radius: 10px;
            border: 1px solid #2a2a4a; background: #0f0f1a; color: #fff; font-size: 14px;
            transition: border-color 0.3s;
        }
        .input-group input:focus { outline: none; border-color: #6366f1; }
        .btn {
            width: 100%; padding: 12px; border: none; border-radius: 10px;
            font-size: 14px; font-weight: 600; cursor: pointer; margin: 6px 0;
            transition: all 0.3s;
        }
        .btn-primary { background: #6366f1; color: #fff; }
        .btn-primary:hover { background: #5558e6; }
        .btn-google { background: #4285f4; color: #fff; }
        .btn-github { background: #333; color: #fff; }
        .divider { text-align: center; color: #666; margin: 16px 0; }
        .divider::before, .divider::after { content: " — "; }
        .links { text-align: center; margin-top: 16px; font-size: 13px; }
        .links a { color: #6366f1; text-decoration: none; }
        .links a:hover { text-decoration: underline; }
        .error { color: #ef4444; font-size: 12px; text-align: center; margin-top: 8px; display: none; }
        .success { color: #22c55e; font-size: 12px; text-align: center; margin-top: 8px; display: none; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>🔐 Nexus Remote</h1>
        <p class="subtitle">Sign in to your account</p>
        
        <div class="input-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="your@email.com" autofocus>
        </div>
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>
        
        <p class="error" id="error">Invalid credentials</p>
        <p class="success" id="success">Login successful!</p>
        
        <button class="btn btn-primary" onclick="login()">Sign In</button>
        
        <div class="divider">or</div>
        
        <button class="btn btn-google" onclick="oauthLogin('google')">🔵 Sign in with Google</button>
        <button class="btn btn-github" onclick="oauthLogin('github')">🐙 Sign in with GitHub</button>
        
        <div class="links">
            <a href="/register">Create account</a> &nbsp;•&nbsp;
            <a href="/reset">Forgot password?</a>
        </div>
    </div>

    <script>
        const API = '/api/auth';
        
        async function login() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            
            if (!email || !password) {
                return showMsg('Please fill all fields', 'error');
            }
            
            try {
                const resp = await fetch(API + '/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({email, password})
                });
                const data = await resp.json();
                
                if (data.token) {
                    // Сохраняем токен для UI клиента
                    localStorage.setItem('nexus_token', data.token);
                    localStorage.setItem('nexus_peer_id', data.peer_id);
                    localStorage.setItem('nexus_email', email);
                    
                    showMsg('Login successful! Redirecting to app...', 'success');
                    
                    // еренаправляем в схему nexus:// для открытия UI клиента
                    setTimeout(() => {
                        window.location.href = 
exus://login?token=&peer_id=&email=;
                    }, 1000);
                } else {
                    showMsg(data.error || 'Login failed', 'error');
                }
            } catch(e) {
                showMsg('Connection error', 'error');
            }
        }
        
        function oauthLogin(provider) {
            fetch(API + '/oauth', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({provider})
            })
            .then(r => r.json())
            .then(data => {
                if (data.url) window.location.href = data.url;
            });
        }
        
        function showMsg(msg, type) {
            const el = document.getElementById(type);
            el.textContent = msg;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 3000);
        }
        
        // Enter key
        document.getElementById('password').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') login();
        });
    </script>
</body>
</html>

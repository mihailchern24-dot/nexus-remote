<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Nexus Remote</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0a0a1a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: #151530;
            border-radius: 20px;
            padding: 40px;
            width: 420px;
            border: 1px solid #2a2a4a;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .logo { text-align: center; font-size: 28px; font-weight: bold; background: linear-gradient(135deg, #6366f1, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px; }
        .subtitle { text-align: center; color: #888; font-size: 13px; margin-bottom: 30px; }
        .input-group { margin-bottom: 16px; }
        .input-group label { display: block; margin-bottom: 6px; color: #888; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
        .input-group input {
            width: 100%; padding: 12px 16px; border-radius: 10px;
            border: 1px solid #2a2a4a; background: #0a0a1a; color: #fff; font-size: 14px;
            transition: border-color 0.3s;
        }
        .input-group input:focus { outline: none; border-color: #6366f1; }
        .btn {
            width: 100%; padding: 12px; border: none; border-radius: 10px;
            font-size: 14px; font-weight: 600; cursor: pointer; margin: 6px 0;
            transition: all 0.3s;
        }
        .btn-primary { background: #6366f1; color: #fff; }
        .btn-primary:hover { background: #5558e6; transform: translateY(-1px); }
        .msg { font-size: 12px; text-align: center; margin-top: 8px; display: none; padding: 8px; border-radius: 6px; }
        .msg.error { background: rgba(239,68,68,0.1); color: #ef4444; }
        .msg.success { background: rgba(34,197,94,0.1); color: #22c55e; }
        .links { text-align: center; margin-top: 20px; font-size: 13px; }
        .links a { color: #6366f1; text-decoration: none; }
        .back-link { display: block; text-align: center; color: #888; font-size: 13px; margin-top: 20px; text-decoration: none; }
        .password-hint { color: #888; font-size: 11px; margin-top: -10px; margin-bottom: 14px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">⚡ Nexus Remote</div>
        <p class="subtitle">Create your free account</p>
        
        <div class="input-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="your@email.com" autofocus>
        </div>
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Min 8 characters">
            <p class="password-hint">Must be at least 8 characters</p>
        </div>
        <div class="input-group">
            <label>Confirm Password</label>
            <input type="password" id="confirm" placeholder="Repeat your password">
        </div>
        
        <div class="msg error" id="error"></div>
        <div class="msg success" id="success"></div>
        
        <button class="btn btn-primary" onclick="register()">Create Account</button>
        
        <div class="links">
            Already have an account? <a href="/login">Sign in</a>
        </div>
        
        <a href="/" class="back-link">← Back to home</a>
    </div>

    <script>
        async function register() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const confirm = document.getElementById('confirm').value.trim();
            
            if (!email || !password) return showMsg('Please fill all fields', 'error');
            if (password !== confirm) return showMsg('Passwords do not match', 'error');
            if (password.length < 8) return showMsg('Password must be at least 8 characters', 'error');
            
            try {
                const resp = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({email, password})
                });
                const data = await resp.json();
                
                if (data.token) {
                    showMsg('Account created! Redirecting...', 'success');
                    setTimeout(() => window.location.href = '/login?registered=1', 1500);
                } else {
                    showMsg(data.error || 'Registration failed', 'error');
                }
            } catch(e) {
                showMsg('Connection error', 'error');
            }
        }
        
        function showMsg(msg, type) {
            const el = document.getElementById(type);
            el.textContent = msg;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 4000);
        }
    </script>
</body>
</html>

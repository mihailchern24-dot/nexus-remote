<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - Nexus Remote</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:#0a0a1a;color:#e0e0e0;min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:#151530;border-radius:20px;padding:36px;width:420px;border:1px solid #2a2a4a;box-shadow:0 20px 60px rgba(0,0,0,0.5)}
.logo{text-align:center;font-size:26px;font-weight:bold;background:linear-gradient(135deg,#6366f1,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
.sub{text-align:center;color:#888;font-size:12px;margin-bottom:20px}
.steps{display:flex;justify-content:center;gap:6px;margin-bottom:20px}
.step{width:28px;height:28px;border-radius:50%;background:#1a1a3e;color:#555;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:bold}
.step.active{background:#6366f1;color:#fff}.step.done{background:#22c55e;color:#fff}
.inp{margin-bottom:12px}
.inp label{display:block;color:#888;font-size:11px;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.inp input{width:100%;padding:12px;border-radius:8px;border:1px solid #2a2a4a;background:#0a0a1a;color:#fff;font-size:14px}
.inp input:focus{outline:none;border-color:#6366f1}
.strength{height:3px;background:#1a1a3e;border-radius:2px;margin-top:4px;overflow:hidden}
.strength-bar{height:100%;border-radius:2px;transition:all 0.3s}
.btn{width:100%;padding:12px;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;margin:6px 0;color:#fff}
.btn-primary{background:#6366f1}.btn-google{background:#4285f4}.btn-github{background:#333}.btn-ms{background:#0078d4}
.msg{padding:8px;border-radius:6px;font-size:11px;text-align:center;margin:8px 0;display:none}
.msg.error{background:rgba(239,68,68,0.1);color:#ef4444;display:block}
.msg.success{background:rgba(34,197,94,0.1);color:#22c55e;display:block}
.captcha-box{background:#0a0a1a;border:1px solid #2a2a4a;border-radius:8px;padding:10px;margin:10px 0;text-align:center}
.captcha-box span{font-size:20px;font-weight:bold;color:#f59e0b;letter-spacing:3px}
.captcha-box input{width:100%;padding:8px;margin-top:6px;border-radius:6px;border:1px solid #2a2a4a;background:#151530;color:#fff;text-align:center;font-size:14px}
.divider{text-align:center;color:#555;margin:16px 0;font-size:12px}
.links{text-align:center;margin-top:16px;font-size:12px}
.links a{color:#6366f1;text-decoration:none}
</style>
</head>
<body>
<div class="card">
<div class="logo">Nexus Remote</div>
<div class="sub">Create your free account</div>

<div class="steps">
<div class="step active" id="s1">1</div><div class="step" id="s2">2</div><div class="step" id="s3">3</div>
</div>

<div id="step1">
<div class="inp"><label>Email Address</label><input type="email" id="email" placeholder="your@email.com"></div>
<button class="btn btn-primary" onclick="nextStep()">Continue</button>
</div>

<div id="step2" style="display:none">
<div class="inp"><label>Create Password</label><input type="password" id="password" placeholder="Min 8 characters" oninput="checkStrength()">
<div class="strength"><div class="strength-bar" id="strengthBar" style="width:0%"></div></div>
<small id="strengthText" style="color:#888">Enter password</small></div>
<div class="inp"><label>Confirm Password</label><input type="password" id="confirm" placeholder="Repeat password"></div>
<button class="btn btn-primary" onclick="nextStep()">Continue</button>
<button class="btn" style="background:transparent;color:#888" onclick="prevStep()">Back</button>
</div>

<div id="step3" style="display:none">
<div class="captcha-box">
<p style="color:#888;font-size:11px;margin-bottom:6px">Verify you are human:</p>
<span id="captchaText">---</span>
<input type="text" id="captchaInput" placeholder="Enter code" maxlength="6">
</div>
<div class="msg error" id="error"></div>
<div class="msg success" id="success"></div>
<button class="btn btn-primary" onclick="register()">Create Account</button>
<button class="btn" style="background:transparent;color:#888" onclick="prevStep()">Back</button>
</div>

<div class="divider">or sign up with</div>
<button class="btn btn-google" onclick="socialReg('google')">Google</button>
<button class="btn btn-github" onclick="socialReg('github')">GitHub</button>
<button class="btn btn-ms" onclick="socialReg('microsoft')">Microsoft</button>

<div class="links"><a href="/login">Already have an account? Sign in</a></div>
</div>

<script>
let step = 1, captchaAnswer = '';

function updateSteps(s) {
    step = s;
    document.getElementById('s1').className = s>1?'step done':'step active';
    document.getElementById('s2').className = s>2?'step done':(s==2?'step active':'step');
    document.getElementById('s3').className = s==3?'step active':'step';
    document.getElementById('step1').style.display = s==1?'block':'none';
    document.getElementById('step2').style.display = s==2?'block':'none';
    document.getElementById('step3').style.display = s==3?'block':'none';
}

function nextStep() {
    if (step==1) {
        const email = document.getElementById('email').value.trim();
        if (!email || !email.includes('@')) return showMsg('Enter valid email','error');
    }
    if (step==2) {
        const pw = document.getElementById('password').value;
        const cf = document.getElementById('confirm').value;
        if (pw.length<8) return showMsg('Password must be 8+ characters','error');
        if (pw!==cf) return showMsg('Passwords do not match','error');
    }
    if (step==3) {
        const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
        captchaAnswer = '';
        for(let i=0;i<6;i++) captchaAnswer += chars[Math.floor(Math.random()*chars.length)];
        document.getElementById('captchaText').textContent = captchaAnswer;
    }
    updateSteps(step+1);
}

function prevStep() { if(step>1) updateSteps(step-1); }

function checkStrength() {
    const pw = document.getElementById('password').value;
    const bar = document.getElementById('strengthBar');
    const txt = document.getElementById('strengthText');
    let s=0; if(pw.length>=8)s++;if(/[A-Z]/.test(pw))s++;if(/[0-9]/.test(pw))s++;if(/[^A-Za-z0-9]/.test(pw))s++;
    const w = [0,25,50,75,100][s]; const c = ['#ef4444','#f59e0b','#6366f1','#22c55e'][s];
    bar.style.width = w+'%'; bar.style.background = c;
    txt.textContent = ['Too weak','Weak','Fair','Good','Strong'][s];
}

async function register() {
    const captcha = document.getElementById('captchaInput').value.trim();
    if (captcha.toUpperCase() !== captchaAnswer) {
        return showMsg('Wrong captcha code','error');
    }
    
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    
    try {
        const resp = await fetch('/api/auth/register', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({email, password})
        });
        const data = await resp.json();
        if (data.token) {
            showMsg('Account created! Redirecting...','success');
            setTimeout(() => window.location.href='/dashboard', 1500);
        } else {
            showMsg(data.error || 'Registration failed','error');
        }
    } catch(e) { showMsg('Connection error','error'); }
}

function socialReg(p) { window.location.href = '/api/auth/oauth/'+p; }
function showMsg(m,t) {
    const el = document.getElementById(t);
    el.textContent = m; el.style.display = 'block';
    setTimeout(() => el.style.display = 'none', 4000);
}
</script>
</body>
</html>

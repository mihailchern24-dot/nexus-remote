<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Nexus Remote</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: #151530;
            border-radius: 24px;
            padding: 48px;
            width: 100%;
            max-width: 440px;
            border: 1px solid #2a2a4a;
            box-shadow: 0 25px 80px rgba(0,0,0,0.5);
        }
        .logo { 
            text-align: center; 
            font-size: 32px; 
            font-weight: 800; 
            background: linear-gradient(135deg, #6366f1, #818cf8, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px; 
        }
        .subtitle { text-align: center; color: #888; font-size: 14px; margin-bottom: 36px; }
        
        .progress-steps {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 32px;
        }
        .step {
            width: 32px; height: 32px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; font-weight: 700;
            background: #1a1a3e; color: #555;
            transition: all 0.3s;
        }
        .step.active { background: #6366f1; color: #fff; }
        .step.done { background: #22c55e; color: #fff; }
        .step-line {
            width: 40px; height: 2px;
            background: #1a1a3e;
            align-self: center;
        }
        .step-line.done { background: #22c55e; }
        
        .input-group { margin-bottom: 20px; }
        .input-group label { 
            display: block; 
            margin-bottom: 8px; 
            color: #888; 
            font-size: 12px; 
            text-transform: uppercase; 
            letter-spacing: 1.5px;
            font-weight: 600;
        }
        .input-group input {
            width: 100%; 
            padding: 14px 16px; 
            border-radius: 12px;
            border: 2px solid #2a2a4a; 
            background: #0a0a1a; 
            color: #fff; 
            font-size: 15px;
            transition: all 0.3s;
        }
        .input-group input:focus { 
            outline: none; 
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
        }
        .input-group input.error { border-color: #ef4444; }
        .input-group .hint { 
            color: #666; 
            font-size: 11px; 
            margin-top: 6px; 
        }
        .input-group .error-msg {
            color: #ef4444;
            font-size: 11px;
            margin-top: 4px;
            display: none;
        }
        
        .password-strength {
            height: 4px;
            background: #1a1a3e;
            border-radius: 2px;
            margin-top: 8px;
            overflow: hidden;
        }
        .password-strength-bar {
            height: 100%;
            border-radius: 2px;
            transition: all 0.3s;
            width: 0%;
        }
        .strength-weak { background: #ef4444; width: 25%; }
        .strength-fair { background: #f59e0b; width: 50%; }
        .strength-good { background: #6366f1; width: 75%; }
        .strength-strong { background: #22c55e; width: 100%; }
        
        .checkbox-group {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 24px;
        }
        .checkbox-group input[type="checkbox"] {
            width: 18px; height: 18px;
            margin-top: 2px;
            accent-color: #6366f1;
        }
        .checkbox-group label {
            color: #888;
            font-size: 13px;
            line-height: 1.5;
        }
        .checkbox-group label a {
            color: #6366f1;
            text-decoration: none;
        }
        .checkbox-group label a:hover { text-decoration: underline; }
        
        .btn {
            width: 100%; 
            padding: 14px; 
            border: none; 
            border-radius: 12px;
            font-size: 16px; 
            font-weight: 700; 
            cursor: pointer; 
            transition: all 0.3s;
            letter-spacing: 0.5px;
        }
        .btn-primary { 
            background: linear-gradient(135deg, #6366f1, #5558e6); 
            color: #fff;
            box-shadow: 0 4px 20px rgba(99,102,241,0.3);
        }
        .btn-primary:hover { 
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(99,102,241,0.4);
        }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .divider { 
            text-align: center; 
            color: #555; 
            margin: 24px 0;
            font-size: 13px;
        }
        .divider::before, .divider::after { content: "  ——  "; }
        
        .social-buttons { display: flex; gap: 12px; }
        .btn-social {
            flex: 1;
            padding: 12px;
            border: 2px solid #2a2a4a;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            background: transparent;
            color: #e0e0e0;
        }
        .btn-social:hover { border-color: #6366f1; background: rgba(99,102,241,0.1); }
        
        .links { 
            text-align: center; 
            margin-top: 24px; 
            font-size: 14px;
            color: #888;
        }
        .links a { color: #6366f1; text-decoration: none; font-weight: 600; }
        .links a:hover { text-decoration: underline; }
        
        .msg { 
            font-size: 13px; 
            text-align: center; 
            margin-top: 12px; 
            display: none; 
            padding: 12px; 
            border-radius: 10px;
            font-weight: 500;
        }
        .msg.error { background: rgba(239,68,68,0.1); color: #ef4444; border: 1px solid rgba(239,68,68,0.2); }
        .msg.success { background: rgba(34,197,94,0.1); color: #22c55e; border: 1px solid rgba(34,197,94,0.2); }
        
        .benefits {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 24px;
        }
        .benefit-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: #888;
        }
        .benefit-item .icon { font-size: 16px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">⚡ Nexus Remote</div>
        <p class="subtitle">Create your free account in 30 seconds</p>
        
        <!-- Progress Steps -->
        <div class="progress-steps">
            <div class="step active" id="step1">1</div>
            <div class="step-line" id="line1"></div>
            <div class="step" id="step2">2</div>
            <div class="step-line" id="line2"></div>
            <div class="step" id="step3">3</div>
        </div>
        
        <!-- Benefits -->
        <div class="benefits">
            <div class="benefit-item"><span class="icon">✅</span> Free forever</div>
            <div class="benefit-item"><span class="icon">🔐</span> E2E Encrypted</div>
            <div class="benefit-item"><span class="icon">📱</span> All platforms</div>
            <div class="benefit-item"><span class="icon">🎮</span> Game streaming</div>
        </div>
        
        <!-- Step 1: Email -->
        <div id="form-step1">
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="your@email.com" autofocus>
                <span class="hint">We'll send you a verification code</span>
                <span class="error-msg" id="email-error">Please enter a valid email</span>
            </div>
            <button class="btn btn-primary" onclick="nextStep(2)">Continue →</button>
        </div>
        
        <!-- Step 2: Password -->
        <div id="form-step2" style="display:none">
            <div class="input-group">
                <label>Create Password</label>
                <input type="password" id="password" placeholder="Min 8 characters">
                <div class="password-strength"><div class="password-strength-bar" id="strengthBar"></div></div>
                <span class="hint" id="strengthText">Enter password</span>
            </div>
            <div class="input-group">
                <label>Confirm Password</label>
                <input type="password" id="confirm" placeholder="Repeat your password">
                <span class="error-msg" id="confirm-error">Passwords do not match</span>
            </div>
            <button class="btn btn-primary" onclick="nextStep(3)">Continue →</button>
            <button class="btn btn-social" style="margin-top:8px;background:transparent;border:none;color:#888" onclick="prevStep(1)">← Back</button>
        </div>
        
        <!-- Step 3: Agreement & Create -->
        <div id="form-step3" style="display:none">
            <div class="checkbox-group">
                <input type="checkbox" id="agreeTerms">
                <label for="agreeTerms">
                    I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
                </label>
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="agreeNews" checked>
                <label for="agreeNews">
                    Send me product updates and tips (optional)
                </label>
            </div>
            
            <div class="msg error" id="error"></div>
            <div class="msg success" id="success"></div>
            
            <button class="btn btn-primary" id="createBtn" onclick="register()">
                🚀 Create Free Account
            </button>
            <button class="btn btn-social" style="margin-top:8px;background:transparent;border:none;color:#888" onclick="prevStep(2)">← Back</button>
        </div>
        
        <div class="divider">or sign up with</div>
        
        <div class="social-buttons">
            <button class="btn-social" onclick="oauthRegister('google')">🔵 Google</button>
            <button class="btn-social" onclick="oauthRegister('github')">🐙 GitHub</button>
            <button class="btn-social" onclick="oauthRegister('microsoft')">⊞ Microsoft</button>
        </div>
        
        <div class="links">
            Already have an account? <a href="/login">Sign in</a>
        </div>
    </div>

    <script>
        let currentStep = 1;
        const totalSteps = 3;
        
        function updateSteps(step) {
            currentStep = step;
            
            // Update progress dots
            for (let i = 1; i <= totalSteps; i++) {
                const dot = document.getElementById('step' + i);
                const line = document.getElementById('line' + i);
                dot.className = 'step';
                if (line) line.className = 'step-line';
                
                if (i < step) {
                    dot.classList.add('done');
                    if (line) line.classList.add('done');
                } else if (i === step) {
                    dot.classList.add('active');
                }
            }
            
            // Show/hide forms
            document.getElementById('form-step1').style.display = step === 1 ? 'block' : 'none';
            document.getElementById('form-step2').style.display = step === 2 ? 'block' : 'none';
            document.getElementById('form-step3').style.display = step === 3 ? 'block' : 'none';
        }
        
        function nextStep(step) {
            if (step === 2) {
                const email = document.getElementById('email').value.trim();
                if (!email || !email.includes('@')) {
                    document.getElementById('email-error').style.display = 'block';
                    document.getElementById('email').classList.add('error');
                    return;
                }
                document.getElementById('email-error').style.display = 'none';
                document.getElementById('email').classList.remove('error');
            }
            
            if (step === 3) {
                const password = document.getElementById('password').value.trim();
                const confirm = document.getElementById('confirm').value.trim();
                
                if (password.length < 8) {
                    showMsg('Password must be at least 8 characters', 'error');
                    return;
                }
                if (password !== confirm) {
                    document.getElementById('confirm-error').style.display = 'block';
                    return;
                }
                document.getElementById('confirm-error').style.display = 'none';
            }
            
            updateSteps(step);
        }
        
        function prevStep(step) {
            updateSteps(step);
        }
        
        // Password strength
        document.getElementById('password').addEventListener('input', function(e) {
            const password = e.target.value;
            const bar = document.getElementById('strengthBar');
            const text = document.getElementById('strengthText');
            
            bar.className = 'password-strength-bar';
            
            if (password.length === 0) {
                bar.style.width = '0%';
                text.textContent = 'Enter password';
            } else if (password.length < 6) {
                bar.classList.add('strength-weak');
                text.textContent = 'Weak - Too short';
            } else if (password.length < 8) {
                bar.classList.add('strength-fair');
                text.textContent = 'Fair - Add more characters';
            } else if (!/[A-Z]/.test(password) || !/[0-9]/.test(password)) {
                bar.classList.add('strength-good');
                text.textContent = 'Good - Add numbers and uppercase';
            } else {
                bar.classList.add('strength-strong');
                text.textContent = 'Strong password!';
            }
        });
        
        async function register() {
            if (!document.getElementById('agreeTerms').checked) {
                showMsg('Please agree to Terms of Service', 'error');
                return;
            }
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            
            const btn = document.getElementById('createBtn');
            btn.disabled = true;
            btn.textContent = 'Creating account...';
            
            try {
                const resp = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({email, password})
                });
                const data = await resp.json();
                
                if (data.token) {
                    showMsg('Account created! Redirecting to dashboard...', 'success');
                    localStorage.setItem('nexus_token', data.token);
                    localStorage.setItem('nexus_peer_id', data.peer_id);
                    localStorage.setItem('nexus_email', email);
                    setTimeout(() => window.location.href = '/dashboard', 1500);
                } else {
                    showMsg(data.error || 'Registration failed', 'error');
                    btn.disabled = false;
                    btn.textContent = '🚀 Create Free Account';
                }
            } catch(e) {
                showMsg('Connection error', 'error');
                btn.disabled = false;
                btn.textContent = '🚀 Create Free Account';
            }
        }
        
        function oauthRegister(provider) {
            showMsg('Sign up with ' + provider + ' coming soon...', 'success');
        }
        
        function showMsg(msg, type) {
            const el = document.getElementById(type);
            el.textContent = msg;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 5000);
        }
    </script>
</body>
</html>
